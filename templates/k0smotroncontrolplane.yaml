apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: K0smotronControlPlane
metadata:
  name: {{ .Values.clusterName }}-cp
  namespace: {{ .Release.Namespace }}
spec:
  version: {{ .Values.k0s.version }}
  etcd:
    autoDeletePVCs: {{ .Values.etcd.autoDeletePVCs }}
  persistence:
    type: emptyDir
  service:
    type: ClusterIP
    apiPort: 6443
    konnectivityPort: 8132
  {{- if and .Values.ingress.enabled .Values.ingress.apiHost .Values.ingress.konnectivityHost }}
  ingress:
    deploy: true
    apiHost: {{ .Values.ingress.apiHost }}
    konnectivityHost: {{ .Values.ingress.konnectivityHost }}
    className: {{ .Values.ingress.className }}
    port: {{ .Values.ingress.port }}
    {{- if .Values.ingress.annotations }}
    annotations:
      {{- toYaml .Values.ingress.annotations | nindent 6 }}
    {{- end }}
  k0sConfig:
    apiVersion: k0s.k0sproject.io/v1beta1
    kind: ClusterConfig
    metadata:
      name: k0s
    spec:
      network:
        provider: custom
        podCIDR: {{ .Values.clusterNetwork.pods.cidrBlock }}
        serviceCIDR: {{ .Values.clusterNetwork.services.cidrBlock }}
      extensions:
        helm:
          repositories:
            - name: cilium
              url: https://helm.cilium.io/
            - name: hcloud
              url: https://charts.hetzner.cloud
          charts:
            - name: cilium
              chartname: cilium/cilium
              version: "1.19.4"
              namespace: kube-system
              values: |
                k8sServiceHost: {{ .Values.ingress.apiHost }}
                k8sServicePort: {{ .Values.ingress.port | quote }}
                routingMode: tunnel
                tunnelProtocol: vxlan
                operator:
                  replicas: 1
                  hostNetwork: true
                  tolerations:
                    - operator: Exists
                ipam:
                  mode: cluster-pool
                  operator:
                    clusterPoolIPv4PodCIDRList:
                      - {{ .Values.clusterNetwork.pods.cidrBlock }}
                    clusterPoolIPv4MaskSize: 24
            - name: hcloud-cloud-controller-manager
              chartname: hcloud/hcloud-cloud-controller-manager
              version: "1.31.1"
              namespace: kube-system
              values: |
                env:
                  HCLOUD_TOKEN:
                    valueFrom:
                      secretKeyRef:
                        name: hcloud
                        key: token
                  KUBERNETES_SERVICE_HOST:
                    value: {{ .Values.ingress.apiHost | quote }}
                  KUBERNETES_SERVICE_PORT:
                    value: {{ .Values.ingress.port | quote }}
                networking:
                  enabled: false
                additionalTolerations:
                  - key: node.kubernetes.io/not-ready
                    effect: NoSchedule
                  - key: node.kubernetes.io/unreachable
                    effect: NoSchedule
            - name: hcloud-csi
              chartname: hcloud/hcloud-csi
              version: "2.21.1"
              namespace: kube-system
              values: |
                storageClasses:
                  - name: hcloud-volumes
                    defaultStorageClass: true
                node:
                  kubeletDir: /var/lib/k0s/kubelet
      telemetry:
        enabled: false
  {{- end }}
